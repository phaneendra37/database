name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: ${{ secrets.DATABASE }}
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "14"

      - name: Install Dependencies
        run: npm install

      - name: Set up PostgreSQL Client
        run: sudo apt-get -y install postgresql-client

      - name: Running DB Queries
        run: |
          psql -h ${{ secrets.DATABASE_HOST }} -U ${{ secrets.DATABASE_USER }} -d ${{ secrets.DATABASE }} -a -f "$GITHUB_WORKSPACE/${{ secrets.MAIN_FILE }}"

        env:
          PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          PGUSER: ${{ secrets.DATABASE_USER }}
          PGHOST: ${{ secrets.DATABASE_HOST }}
          PGDATABASE: ${{ secrets.DATABASE }}
